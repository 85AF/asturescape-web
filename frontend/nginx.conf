# frontend/nginx.conf
server {
    listen 80;
    server_name localhost; # Adjust if needed for specific domain

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve React static files (HTML, JS, CSS, images, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # /api/ will be stripped from the path before forwarding to backend
    # e.g., /api/jobs/ becomes /jobs/ on the backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off; # Useful for streaming or long-polling if ever needed
    }

    # Proxy WebSocket connections for job status
    # This assumes the frontend connects to ws://<host>/ws/job_status/...
    # and the backend expects /ws/job_status/...
    location /ws/ {
        proxy_pass http://backend:8000/ws/; # Ensure backend path matches what FastAPI expects
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s; # Keep connection open longer for WebSockets
        proxy_send_timeout 86400s;
    }

    # Location for serving transcription result files
    # This path needs to match the volume mount in docker-compose.yml for nginx service
    # and how result_txt_path/result_srt_path are stored in the DB (relative to this alias)
    location /transcription_results/ {
        alias /app_data/transcription_results/; # This path is INSIDE the nginx container
        # try_files $uri =404; # Optional: return 404 if file not found, good for debugging
        add_header Cache-Control "no-cache, no-store, must-revalidate"; # Ensure fresh files
        expires -1; # Ensure no caching by proxies/browsers
    }

    # Optional: Basic error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html; # Or a custom error page directory
    }
}
